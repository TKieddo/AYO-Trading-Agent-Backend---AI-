version: '3.8'

services:
  # Python Trading Agent
  trading-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - APP_PORT=3000
      - API_HOST=0.0.0.0
      # Add your environment variables here or use .env file
      # - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      # - BINANCE_API_KEY=${BINANCE_API_KEY}
      # - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      # etc...
    env_file:
      - .env
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Dashboard (optional - can deploy separately)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: trading-dashboard
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - NEXT_PUBLIC_API_URL=http://trading-agent:3000
      # Add your environment variables here
      # - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      # - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    env_file:
      - dashboard/.env.local
    networks:
      - trading-network
    depends_on:
      - trading-agent

networks:
  trading-network:
    driver: bridge
